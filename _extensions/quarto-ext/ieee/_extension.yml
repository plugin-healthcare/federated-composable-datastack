title: Typst IEE
author: J.J. Allaire
version: "0.2.0"
quarto-required: ">=1.4.11"
contributes:
  formats:
    common:
      number-sections: true
      shortcodes:
        - fancy-text
      crossref:
        chapters: false
        eq-prefix:
        eq-labels: (roman)
        fig-title: Fig.
        fig-prefix: Fig.
      cite-method: citeproc
    typst:
      toc: true
      toc-location: left
      template-partials:
        - typst-template.typ
        - typst-show.typ
    html:
      toc: true
      toc-location: left